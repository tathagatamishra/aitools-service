server:
  port: 8083

spring:
  application:
    name: aitools-service

  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3310/costroomdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:CostRoomDev123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 30000
      keepalive-time: 60000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0          # ← add this
    table: flyway_schema_history_aitools  # ← add this — separate history table


  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_fxW1EzwhJ}
          jwk-set-uri: ${COGNITO_JWK_SET_URI:https://cognito-idp.ap-southeast-2.amazonaws.com/ap-southeast-2_fxW1EzwhJ/.well-known/jwks.json}

# AES-256 key (base64-encoded). Generate with EncryptionService.generateBase64AesKey()
# Rotate via env var in production — never commit real keys.
app:
  encryption:
    key: ${ENCRYPTION_KEY:T3kFLvZ3jd0cCHwo86oGr478LCZHpUTo4cX4byAiTkQ=}
  ingestion:
    # Every 6 hours by default. Override via env var (e.g. 60000 = 1 min for local dev).
    fixed-rate-ms: ${INGESTION_RATE_MS:21600000}

# Internal service URLs
org-service:
  base-url: ${ORG_SERVICE_BASE_URL:http://localhost:8082}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.costroom.aitoolsservice: DEBUG
    org.flywaydb: DEBUG
